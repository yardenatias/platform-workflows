name: Create Readiness Review

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      repository_name:
        description: "GitHub repository name"
        required: true
        type: string
      target_environment:
        description: "Target environment"
        required: true
        type: string
      change_summary:
        description: "Change summary"
        required: false
        type: string
      jira_reference:
        description: "Jira or release reference"
        required: false
        type: string
      port_context:
        required: true
        type: string

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Inform Port that run started
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: |
            Starting production readiness review request for service: ${{ inputs.service_name }}

      - name: Create GitHub issue
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ISSUE_TITLE="Production readiness review request - ${{ inputs.service_name }}"
          ISSUE_BODY=$(jq -n \
            --arg service "${{ inputs.service_name }}" \
            --arg repo "${{ inputs.repository_name }}" \
            --arg env "${{ inputs.target_environment }}" \
            --arg summary "${{ inputs.change_summary }}" \
            --arg jira "${{ inputs.jira_reference }}" \
            '[
              "## Production Readiness Review Request",
              "",
              "- **Service:** \($service)",
              "- **Repository:** \($repo)",
              "- **Target environment:** \($env)",
              "- **Change summary:** \($summary)",
              "- **Jira reference:** \($jira)"
            ] | join("\n")')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg title "$ISSUE_TITLE" --arg body "$ISSUE_BODY" '{title: $title, body: $body}')" \
            "https://api.github.com/repos/yardenatias/${{ inputs.repository_name }}/issues")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            ISSUE_URL=$(echo "$BODY" | jq -r '.html_url')
            echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
            echo "Issue created successfully: $ISSUE_URL"
          else
            echo "Failed to create issue. Response: $BODY"
            exit 1
          fi

      - name: Inform Port that run succeeded
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          status: SUCCESS
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: |
            GitHub issue created successfully for service ${{ inputs.service_name }}: ${{ steps.create_issue.outputs.issue_url }}

      - name: Inform Port that run failed
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          status: FAILURE
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: |
            Failed to create GitHub issue for service ${{ inputs.service_name }} in repository ${{ inputs.repository_name }}
